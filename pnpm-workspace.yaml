shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - cached-factory
  - ts-api-utils

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver

allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - '@vitest/coverage-v8@4.1.7'
  - '@vitest/expect@4.1.7'
  - '@vitest/mocker@4.1.7'
  - '@vitest/pretty-format@4.1.7'
  - '@vitest/runner@4.1.7'
  - '@vitest/snapshot@4.1.7'
  - '@vitest/spy@4.1.7'
  - '@vitest/utils@4.1.7'
  - vitest@4.1.7
